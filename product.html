<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="navbar">

    <div class="logo">MyStore</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">
            🛒 Cart
            <span id="cart-count">0</span>
        </a>
    </nav>

</header>

<div class="product-page">

    <div class="left">

        <img id="product-image"
        src="images/product1.jpg">

    </div>

    <div class="right">

        <h1 id="product-name">
            Premium Shoes
        </h1>

        <h2 id="product-price">
            $99
        </h2>

        <p id="product-description">

        Premium quality shoes with soft cushioning,
        stylish design and lightweight comfort.

        </p>

        <button class="btn"
        onclick="addCart('Premium Shoes',99,'images/product1.jpg')">

            Add To Cart

        </button>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
